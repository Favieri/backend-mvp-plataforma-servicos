AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Jobeasy API (.NET 8 Minimal API + Lambda HTTP API v2)

Globals:
  Function:
    Runtime: dotnet8
    Architectures:
      - arm64
    Timeout: 30
    MemorySize: 512
    Environment:
      Variables:
        ASPNETCORE_ENVIRONMENT: Production
        DB_CONNECTION:          !Ref DbConnection
        DB_TIMEOUT_SECONDS:     !Ref DbTimeoutSeconds
        JWT_SECRET:             !Ref JwtSecret
        CORS_ALLOWED_ORIGINS:   !Ref CorsAllowedOrigins
        APP_BASE_URL:           !Ref AppBaseUrl
        EMAIL_FROM:             !Ref EmailFrom
        STORAGE_BUCKET_NAME:    !Ref StorageBucketName
        GOOGLE_CLIENT_ID:       !Ref GoogleClientId
        FACEBOOK_APP_ID:        !Ref FacebookAppId

Parameters:
  # ── Banco (obrigatório) ─────────────────────────────────────────────────────
  DbConnection:
    Type: String
    NoEcho: true
    Description: "String de conexão PostgreSQL"
  DbTimeoutSeconds:
    Type: String
    Default: '15'

  # ── Autenticação ────────────────────────────────────────────────────────────
  JwtSecret:
    Type: String
    NoEcho: true
    Default: 'jobeasy-jwt-default-CHANGE-IN-PROD'
    Description: "Secret HMAC-SHA256 para assinar JWTs — configurar JWT_SECRET no GitHub Secrets"

  # ── CORS ────────────────────────────────────────────────────────────────────
  CorsAllowedOrigins:
    Type: String
    Default: 'https://jobeasy.com.br,https://www.jobeasy.com.br'
    Description: "Origens CORS permitidas — NUNCA incluir localhost em produção"

  # ── App ─────────────────────────────────────────────────────────────────────
  AppBaseUrl:
    Type: String
    Default: 'https://jobeasy.com.br'
    Description: "URL base do frontend (usada em links de email)"

  # ── Email ───────────────────────────────────────────────────────────────────
  EmailFrom:
    Type: String
    Default: 'Jobeasy <naoresponda@jobeasy.com.br>'
    Description: "Remetente padrão de emails transacionais (deve ser uma identidade verificada no SES)"

  # ── Storage S3 ──────────────────────────────────────────────────────────────
  StorageBucketName:
    Type: String
    Default: 'jobeasy-storage-prod'
    Description: "Nome do bucket S3 para avatars e anexos"

  # ── Social Auth ─────────────────────────────────────────────────────────────
  GoogleClientId:
    Type: String
    Default: ''
    Description: "Google OAuth Client ID (vazio = login Google desabilitado)"
  FacebookAppId:
    Type: String
    Default: ''
    Description: "Facebook App ID (vazio = login Facebook desabilitado)"

  # ── Mercado Pago ────────────────────────────────────────────────────────────
  MercadoPagoAccessToken:
    Type: String
    NoEcho: true
    Default: ''
    Description: "Access Token da conta da plataforma (vazio = pagamentos desabilitados)"
  MpAppId:
    Type: String
    Default: ''
    Description: "Application ID numérico da aplicação MP — OBRIGATÓRIO para OAuth MP"
  MpClientSecret:
    Type: String
    NoEcho: true
    Default: ''
    Description: "Client Secret da aplicação MP — OBRIGATÓRIO para OAuth MP"
  MpRedirectUri:
    Type: String
    Default: ''
    Description: "URI de callback OAuth registrada no painel MP — deve ser https://<api-gw>/payments/mp/callback"
  MpFrontendBaseUrl:
    Type: String
    Default: 'https://jobeasy.com.br'
    Description: "URL base do frontend para redirecionamento pós-OAuth"
  MpIsSandbox:
    Type: String
    Default: 'false'
    Description: "true para habilitar modo sandbox do Mercado Pago"
  MpApiBaseUrl:
    Type: String
    Default: ''
    Description: "URL base do API Gateway (ex: https://xxx.execute-api.sa-east-1.amazonaws.com)"

  # ── Performance / Provisioned Concurrency (desligado por padrão) ─────────────
  ProvisionedConcurrencyCount:
    Type: Number
    Default: 0
    Description: >
      Número de instâncias quentes mantidas pelo Provisioned Concurrency.
      0 = desabilitado (custo zero, comportamento atual). Para habilitar,
      defina um valor > 0 (ex.: 5 ou 10) e reimplante.

Conditions:
  EnableProvisionedConcurrency: !Not [!Equals [!Ref ProvisionedConcurrencyCount, 0]]

Resources:
  JobeasyHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: '$default'

  JobeasyApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../
      Handler: Api
      AutoPublishAlias: live
      ProvisionedConcurrencyConfig: !If
        - EnableProvisionedConcurrency
        - ProvisionedConcurrentExecutions: !Ref ProvisionedConcurrencyCount
        - !Ref AWS::NoValue
      Environment:
        Variables:
          # Mercado Pago fora de Globals pois usa chave com __ (seção aninhada ASP.NET)
          MERCADOPAGO__ACCESSTOKEN:    !Ref MercadoPagoAccessToken
          MERCADOPAGO__APPID:          !Ref MpAppId
          MERCADOPAGO__CLIENTSECRET:   !Ref MpClientSecret
          MERCADOPAGO__REDIRECTURI:    !Ref MpRedirectUri
          MERCADOPAGO__FRONTENDBASEURL: !Ref MpFrontendBaseUrl
          MERCADOPAGO__ISSANDBOX:      !Ref MpIsSandbox
          MERCADOPAGO__APIBASEURL:     !Ref MpApiBaseUrl
          MERCADOPAGO__SKIPWEBHOOKSIGNATUREVALIDATION: !Ref MpIsSandbox
      Events:
        ProxyEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref JobeasyHttpApi
            Path: /{proxy+}
            Method: ANY
      Policies:
        - AWSLambdaBasicExecutionRole
        - S3CrudPolicy:
            BucketName: !Ref StorageBucketName
        - Statement:
            - Sid: AllowSesSendEmail
              Effect: Allow
              Action:
                - ses:SendEmail
              Resource: !Sub 'arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/*'
    Metadata:
      BuildMethod: makefile

Outputs:
  ApiUrl:
    Description: HTTP API endpoint URL
    Value: !Sub 'https://${JobeasyHttpApi}.execute-api.${AWS::Region}.amazonaws.com'
  StorageBucketNameOutput:
    Description: Bucket S3 de storage
    Value: !Ref StorageBucketName
