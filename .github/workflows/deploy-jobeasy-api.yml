name: Deploy jobeasy-api (SAM)

on:
  push:
    branches: [ "main" ]
    paths:
      - "src/**"
      - "tests/**"
      - "infra/**"
      - "Jobeasy.sln"
      - "Directory.Build.props"
      - "Makefile"
      - ".github/workflows/deploy-jobeasy-api.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION:  sa-east-1
      STACK_NAME:  jobeasy-api

      # ── Obrigatório ──────────────────────────────────────────────────────────
      DB_CONNECTION: ${{ secrets.DB_CONNECTION || secrets.DATABASE_URL }}

      # ── Com defaults seguros (deploy funciona; substitua pelos valores reais) ─
      JWT_SECRET:           ${{ secrets.JWT_SECRET           || 'jobeasy-jwt-default-CHANGE-IN-PROD' }}
      CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS || 'https://jobeasy.com.br,http://localhost:3000' }}
      APP_BASE_URL:         ${{ secrets.APP_BASE_URL         || 'https://jobeasy.com.br' }}
      EMAIL_FROM:           ${{ secrets.EMAIL_FROM           || 'Jobeasy <naoresponda@jobeasy.com.br>' }}
      STORAGE_BUCKET_NAME:  ${{ secrets.STORAGE_BUCKET_NAME  || 'jobeasy-storage-prod' }}

      # ── Opcionais (vazio = feature desabilitada) ─────────────────────────────
      SMTP_HOST:       ${{ secrets.SMTP_HOST       || '' }}
      SMTP_PORT:       ${{ secrets.SMTP_PORT       || '587' }}
      SMTP_USER:       ${{ secrets.SMTP_USER       || '' }}
      SMTP_PASS:       ${{ secrets.SMTP_PASS       || '' }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID || '' }}
      FACEBOOK_APP_ID:  ${{ secrets.FACEBOOK_APP_ID  || '' }}
      MP_ACCESS_TOKEN:  ${{ secrets.MP_ACCESS_TOKEN  || secrets.MERCADOPAGO_ACCESS_TOKEN || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Validate required secrets
        run: |
          MISSING=()
          [ -z "${DB_CONNECTION}" ] && MISSING+=("DB_CONNECTION (ou DATABASE_URL)")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "ERROR: os seguintes secrets são obrigatórios e não foram configurados:" >&2
            for s in "${MISSING[@]}"; do echo "  - $s" >&2; done
            echo "" >&2
            echo "Configure em: GitHub → Settings → Secrets and variables → Actions" >&2
            exit 1
          fi
          # Avisos informativos (não bloqueiam)
          [ "${JWT_SECRET}" = "jobeasy-jwt-default-CHANGE-IN-PROD" ] \
            && echo "WARN: JWT_SECRET usando valor default — configure o secret JWT_SECRET para produção" >&2 || true
          [ -z "${SMTP_HOST}" ] \
            && echo "INFO: SMTP_HOST não configurado — emails desabilitados" >&2 || true
          echo "OK — prosseguindo com deploy."

      - name: Restore / Build / Test
        run: |
          dotnet restore Jobeasy.sln
          dotnet build Jobeasy.sln -c Release --no-restore
          dotnet test Jobeasy.sln -c Release --no-build

      - name: Setup AWS SAM
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::660573993178:role/GitHubActions-JobeasyApi-Deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate SAM template and Makefile
        run: |
          test -f Makefile               || (echo "ERROR: Makefile não encontrado na raiz" >&2; exit 1)
          test -f infra/sam/template.yaml || (echo "ERROR: infra/sam/template.yaml não encontrado" >&2; exit 1)
          sam validate -t infra/sam/template.yaml --lint

      - name: SAM Build
        run: sam build -t infra/sam/template.yaml

      - name: Validate SAM build artifacts
        run: |
          echo "=== Conteúdo da função buildada ==="
          ls -la .aws-sam/build/JobeasyApiFunction/
          test -f .aws-sam/build/JobeasyApiFunction/Api.dll \
            || (echo "ERRO: Api.dll ausente no artefato" >&2; exit 1)
          test -f .aws-sam/build/JobeasyApiFunction/Api.deps.json \
            || (echo "ERRO: Api.deps.json ausente no artefato" >&2; exit 1)
          test -f .aws-sam/build/JobeasyApiFunction/Api.runtimeconfig.json \
            || (echo "ERRO: Api.runtimeconfig.json ausente no artefato" >&2; exit 1)
          test ! -f .aws-sam/build/JobeasyApiFunction/Api \
            || (echo "ERRO: binário nativo presente — remova UseAppHost" >&2; exit 1)
          echo "Artefatos OK."

      - name: SAM Deploy
        run: |
          python3 << 'PYEOF'
          import os, subprocess, sys

          def env(key, default=''):
              return os.environ.get(key, default)

          overrides = [
              f"ParameterKey=DbConnection,ParameterValue={env('DB_CONNECTION')}",
              f"ParameterKey=JwtSecret,ParameterValue={env('JWT_SECRET')}",
              f"ParameterKey=CorsAllowedOrigins,ParameterValue={env('CORS_ALLOWED_ORIGINS')}",
              f"ParameterKey=AppBaseUrl,ParameterValue={env('APP_BASE_URL')}",
              f"ParameterKey=EmailFrom,ParameterValue={env('EMAIL_FROM')}",
              f"ParameterKey=SmtpHost,ParameterValue={env('SMTP_HOST')}",
              f"ParameterKey=SmtpPort,ParameterValue={env('SMTP_PORT', '587')}",
              f"ParameterKey=SmtpUser,ParameterValue={env('SMTP_USER')}",
              f"ParameterKey=SmtpPass,ParameterValue={env('SMTP_PASS')}",
              f"ParameterKey=StorageBucketName,ParameterValue={env('STORAGE_BUCKET_NAME')}",
              f"ParameterKey=GoogleClientId,ParameterValue={env('GOOGLE_CLIENT_ID')}",
              f"ParameterKey=FacebookAppId,ParameterValue={env('FACEBOOK_APP_ID')}",
              f"ParameterKey=MercadoPagoAccessToken,ParameterValue={env('MP_ACCESS_TOKEN')}",
          ]

          cmd = [
              'sam', 'deploy',
              '--template-file', '.aws-sam/build/template.yaml',
              '--stack-name',    env('STACK_NAME'),
              '--region',        env('AWS_REGION'),
              '--resolve-s3',
              '--capabilities',  'CAPABILITY_IAM', 'CAPABILITY_NAMED_IAM',
              '--no-confirm-changeset',
              '--no-fail-on-empty-changeset',
              '--parameter-overrides', *overrides,
          ]

          print(f'Executando sam deploy com {len(overrides)} parâmetros...')
          result = subprocess.run(cmd, check=False)
          sys.exit(result.returncode)
          PYEOF

      - name: Print deployed API URL
        run: |
          aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text
