name: Deploy jobeasy-api (SAM)

on:
  push:
    branches: [ "main" ]
    paths:
      - "src/**"
      - "tests/**"
      - "infra/**"
      - "Jobeasy.sln"
      - "Directory.Build.props"
      - "Dockerfile"
      - "Makefile"
      - ".github/workflows/deploy-jobeasy-api.yml"
  workflow_dispatch:

permissions:
  id-token: write   # necessário para OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: sa-east-1
      STACK_NAME: jobeasy-api
      DB_CONNECTION: ${{ secrets.DB_CONNECTION || secrets.DATABASE_URL }}
      MP_ACCESS_TOKEN: ${{ secrets.MP_ACCESS_TOKEN || secrets.MERCADOPAGO_ACCESS_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore/Build/Test
        run: |
          dotnet restore Jobeasy.sln
          dotnet build Jobeasy.sln -c Release --no-restore
          dotnet test Jobeasy.sln -c Release --no-build

      - name: Setup AWS SAM
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::660573993178:role/GitHubActions-JobeasyApi-Deploy
          aws-region: sa-east-1

      - name: Validate SAM build context
        run: |
          test -f Makefile || (echo "ERROR: root Makefile not found" >&2; exit 1)
          if [ -f src/Api/Makefile ]; then
            echo "WARN: src/Api/Makefile exists, but build will use root Makefile because CodeUri points to repository root." >&2
          fi
          awk 'NR>=35 && NR<=58 {print}' infra/sam/template.yaml

      - name: SAM Build
        run: sam build -t infra/sam/template.yaml

      - name: Validate required deploy secrets
        run: |
          if [ -z "${DB_CONNECTION}" ]; then
            echo "ERROR: configure DB_CONNECTION (or DATABASE_URL) in GitHub Secrets." >&2
            exit 1
          fi

      - name: SAM Deploy
        run: |
          PARAM_OVERRIDES=("ParameterKey=DbConnection,ParameterValue=${DB_CONNECTION}")

          if [ -n "${MP_ACCESS_TOKEN}" ]; then
            PARAM_OVERRIDES+=("ParameterKey=MercadoPagoAccessToken,ParameterValue=${MP_ACCESS_TOKEN}")
          else
            echo "INFO: MP_ACCESS_TOKEN/MERCADOPAGO_ACCESS_TOKEN não configurado; usando valor default do template." >&2
          fi

          sam deploy \
            --template-file .aws-sam/build/template.yaml \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --resolve-s3 \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides "${PARAM_OVERRIDES[@]}"
