AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Jobeasy API (.NET 8 Minimal API + Lambda HTTP API v2)

Globals:
  Function:
    Runtime: dotnet8
    Timeout: 30
    MemorySize: 512
    Environment:
      Variables:
        ASPNETCORE_ENVIRONMENT: Production
        DB_CONNECTION: !Ref DbConnection
        DB_TIMEOUT_SECONDS: !Ref DbTimeoutSeconds
        CORS_ALLOWED_ORIGINS: !Ref CorsAllowedOrigins
        # TODO: CREDENTIALS - preencher credenciais SMTP
        SMTP_HOST: !Ref SmtpHost
        SMTP_PORT: !Ref SmtpPort
        SMTP_USER: !Ref SmtpUser
        SMTP_PASS: !Ref SmtpPass
        EMAIL_FROM: !Ref EmailFrom
        APP_BASE_URL: !Ref AppBaseUrl
        JWT_SECRET: !Ref JwtSecret
        STORAGE_BUCKET_NAME: !Ref StorageBucketName
        GOOGLE_CLIENT_ID: !Ref GoogleClientId
        FACEBOOK_APP_ID: !Ref FacebookAppId

Parameters:
  DbConnection:
    Type: String
    NoEcho: true
  DbTimeoutSeconds:
    Type: String
    Default: '15'
  CorsAllowedOrigins:
    Type: String
    Default: '*'
  # TODO: CREDENTIALS - preencher credenciais SMTP antes do deploy
  SmtpHost:
    Type: String
    Default: ''
  SmtpPort:
    Type: String
    Default: '587'
  SmtpUser:
    Type: String
    Default: ''
    NoEcho: true
  SmtpPass:
    Type: String
    Default: ''
    NoEcho: true
  EmailFrom:
    Type: String
    Default: 'Doezy <naoresponda@doezy.com.br>'
  AppBaseUrl:
    Type: String
    Default: 'https://app.doezy.com.br'
  JwtSecret:
    Type: String
    NoEcho: true
    Default: ''
  StorageBucketName:
    Type: String
    Default: 'jobeasy-storage-prod'
  GoogleClientId:
    Type: String
    Default: ''
  FacebookAppId:
    Type: String
    Default: ''

Resources:
  JobeasyHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: '$default'

  JobeasyApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../
      Handler: Api
      Events:
        ProxyEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref JobeasyHttpApi
            Path: /{proxy+}
            Method: ANY
      Policies:
        - AWSLambdaBasicExecutionRole
        - S3CrudPolicy:
            BucketName: !Ref StorageBucketName
    Metadata:
      BuildMethod: makefile

Outputs:
  ApiUrl:
    Description: HTTP API endpoint URL
    Value: !Sub 'https://${JobeasyHttpApi}.execute-api.${AWS::Region}.amazonaws.com'
