AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Jobeasy API (.NET 8 Minimal API + Lambda HTTP API v2)

Globals:
  Function:
    Runtime: dotnet8
    Timeout: 30
    MemorySize: 512
    Environment:
      Variables:
        ASPNETCORE_ENVIRONMENT: Production
        DB_CONNECTION: !Ref DbConnection
        DB_TIMEOUT_SECONDS: !Ref DbTimeoutSeconds
        CORS_ALLOWED_ORIGINS: !Ref CorsAllowedOrigins
        SMTP_HOST: !Ref SmtpHost
        SMTP_PORT: !Ref SmtpPort
        SMTP_USER: !Ref SmtpUser
        SMTP_PASS: !Ref SmtpPass
        EMAIL_FROM: !Ref EmailFrom
        APP_BASE_URL: !Ref AppBaseUrl
        JWT_SECRET: !Ref JwtSecret
        STORAGE_BUCKET_NAME: !Ref StorageBucketName
        GOOGLE_CLIENT_ID: !Ref GoogleClientId
        FACEBOOK_APP_ID: !Ref FacebookAppId

Parameters:
  # ── Banco ──────────────────────────────────────────────────────────────────
  DbConnection:
    Type: String
    NoEcho: true
    Description: "String de conexão PostgreSQL (Supabase pooler)"
  DbTimeoutSeconds:
    Type: String
    Default: '15'
  # ── CORS ───────────────────────────────────────────────────────────────────
  CorsAllowedOrigins:
    Type: String
    Default: '*'
    Description: "Origens permitidas (ex: https://jobeasy.com.br,http://localhost:3000)"
  # ── Autenticação ───────────────────────────────────────────────────────────
  JwtSecret:
    Type: String
    NoEcho: true
    Default: 'jobeasy-jwt-default-CHANGE-IN-PROD'
    Description: "Secret JWT — substituir por valor seguro em produção via GitHub Secret JWT_SECRET"
  # ── Storage ────────────────────────────────────────────────────────────────
  StorageBucketName:
    Type: String
    Default: 'jobeasy-storage-prod'
    Description: "Nome do bucket S3 para avatars e anexos"
  # ── Social Auth ────────────────────────────────────────────────────────────
  GoogleClientId:
    Type: String
    Default: ''
    Description: "Google OAuth Client ID (opcional)"
  FacebookAppId:
    Type: String
    Default: ''
    Description: "Facebook App ID (opcional)"
  # ── Mercado Pago ───────────────────────────────────────────────────────────
  MercadoPagoAccessToken:
    Type: String
    NoEcho: true
    Default: ''
    Description: "Token de acesso do Mercado Pago (opcional no deploy)"
  # ── SMTP ───────────────────────────────────────────────────────────────────
  SmtpHost:
    Type: String
    Default: ''
  SmtpPort:
    Type: String
    Default: '587'
  SmtpUser:
    Type: String
    Default: ''
    NoEcho: true
  SmtpPass:
    Type: String
    Default: ''
    NoEcho: true
  EmailFrom:
    Type: String
    Default: 'Jobeasy <naoresponda@jobeasy.com.br>'
  AppBaseUrl:
    Type: String
    Default: 'https://jobeasy.com.br'

Resources:
  JobeasyHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: '$default'

  JobeasyApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../
      Handler: Api
      Environment:
        Variables:
          MERCADOPAGO__ACCESSTOKEN: !Ref MercadoPagoAccessToken
      Events:
        ProxyEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref JobeasyHttpApi
            Path: /{proxy+}
            Method: ANY
      Policies:
        - AWSLambdaBasicExecutionRole
        - S3CrudPolicy:
            BucketName: !Ref StorageBucketName
    Metadata:
      BuildMethod: makefile

Outputs:
  ApiUrl:
    Description: HTTP API endpoint URL
    Value: !Sub 'https://${JobeasyHttpApi}.execute-api.${AWS::Region}.amazonaws.com'
  StorageBucketName:
    Description: Nome do bucket S3 de storage
    Value: !Ref StorageBucketName
