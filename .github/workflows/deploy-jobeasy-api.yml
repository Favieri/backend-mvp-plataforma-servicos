name: Deploy jobeasy-api (SAM)

on:
  push:
    branches: [ "main" ]
    paths:
      - "src/**"
      - "tests/**"
      - "infra/**"
      - "Jobeasy.sln"
      - "Directory.Build.props"
      - "Makefile"
      - ".github/workflows/deploy-jobeasy-api.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION:  sa-east-1
      STACK_NAME:  jobeasy-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Validate required secrets
        env:
          DB_CONNECTION: ${{ secrets.DB_CONNECTION || secrets.DATABASE_URL }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
        run: |
          if [ -z "${DB_CONNECTION}" ]; then
            echo "ERROR: configure DB_CONNECTION (ou DATABASE_URL) em GitHub Secrets." >&2; exit 1
          fi
          if [ -z "${CORS_ALLOWED_ORIGINS}" ]; then
            echo "ERROR: configure CORS_ALLOWED_ORIGINS em GitHub Secrets." >&2
            echo "Exemplo: https://jobeasy.com.br,https://www.jobeasy.com.br" >&2
            exit 1
          fi
          echo "OK — secrets obrigatórios presentes."

      - name: Restore / Build / Test
        run: |
          dotnet restore Jobeasy.sln
          dotnet build Jobeasy.sln -c Release --no-restore
          dotnet test Jobeasy.sln -c Release --no-build

      - name: Setup AWS SAM
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::660573993178:role/GitHubActions-JobeasyApi-Deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate SAM template and Makefile
        run: |
          test -f Makefile               || (echo "ERROR: Makefile não encontrado" >&2; exit 1)
          test -f infra/sam/template.yaml || (echo "ERROR: template.yaml não encontrado" >&2; exit 1)
          sam validate -t infra/sam/template.yaml --lint

      - name: SAM Build
        run: sam build -t infra/sam/template.yaml

      - name: Validate SAM build artifacts
        run: |
          test -f .aws-sam/build/JobeasyApiFunction/Api.dll \
            || (echo "ERRO: Api.dll ausente" >&2; exit 1)
          test -f .aws-sam/build/JobeasyApiFunction/Api.deps.json \
            || (echo "ERRO: Api.deps.json ausente" >&2; exit 1)
          test -f .aws-sam/build/JobeasyApiFunction/Api.runtimeconfig.json \
            || (echo "ERRO: Api.runtimeconfig.json ausente" >&2; exit 1)
          test ! -f .aws-sam/build/JobeasyApiFunction/Api \
            || (echo "ERRO: binário nativo presente — remova UseAppHost" >&2; exit 1)
          echo "Artefatos OK."

      # ── Escreve os secrets em arquivo JSON via Python ──────────────────────
      # Cada secret é injetado como variável de ambiente APENAS neste step,
      # isolando completamente o shell do conteúdo dos valores.
      # O Python lê via os.environ e escreve JSON sem nenhuma interpretação shell.
      - name: Gerar sam-params.json
        env:
          DB_CONNECTION:          ${{ secrets.DB_CONNECTION || secrets.DATABASE_URL }}
          JWT_SECRET:             ${{ secrets.JWT_SECRET || 'jobeasy-jwt-default-CHANGE-IN-PROD' }}
          CORS_ALLOWED_ORIGINS:   ${{ secrets.CORS_ALLOWED_ORIGINS }}
          APP_BASE_URL:           ${{ secrets.APP_BASE_URL || 'https://jobeasy.com.br' }}
          EMAIL_FROM:             ${{ secrets.EMAIL_FROM || 'Jobeasy <naoresponda@jobeasy.com.br>' }}
          SMTP_HOST:              ${{ secrets.SMTP_HOST || '' }}
          SMTP_PORT:              ${{ secrets.SMTP_PORT || '587' }}
          SMTP_USER:              ${{ secrets.SMTP_USER || '' }}
          SMTP_PASS:              ${{ secrets.SMTP_PASS || '' }}
          STORAGE_BUCKET_NAME:    ${{ secrets.STORAGE_BUCKET_NAME || 'jobeasy-bucket-prod' }}
          GOOGLE_CLIENT_ID:       ${{ secrets.GOOGLE_CLIENT_ID || '' }}
          FACEBOOK_APP_ID:        ${{ secrets.FACEBOOK_APP_ID || '' }}
          MP_ACCESS_TOKEN:        ${{ secrets.MP_ACCESS_TOKEN || secrets.MERCADOPAGO_ACCESS_TOKEN || '' }}
        run: |
          python3 - << 'PYEOF'
          import json, os

          def secret(key, default=''):
              # .strip() remove newlines invisíveis que podem ter entrado no secret
              val = os.environ.get(key, default)
              return val.strip() if val else default

          params = [
            {"ParameterKey": "DbConnection",           "ParameterValue": secret("DB_CONNECTION")},
            {"ParameterKey": "JwtSecret",              "ParameterValue": secret("JWT_SECRET", "jobeasy-jwt-default-CHANGE-IN-PROD")},
            {"ParameterKey": "CorsAllowedOrigins",     "ParameterValue": secret("CORS_ALLOWED_ORIGINS")},
            {"ParameterKey": "AppBaseUrl",             "ParameterValue": secret("APP_BASE_URL", "https://jobeasy.com.br")},
            {"ParameterKey": "EmailFrom",              "ParameterValue": secret("EMAIL_FROM", "Jobeasy <naoresponda@jobeasy.com.br>")},
            {"ParameterKey": "SmtpHost",               "ParameterValue": secret("SMTP_HOST")},
            {"ParameterKey": "SmtpPort",               "ParameterValue": secret("SMTP_PORT", "587")},
            {"ParameterKey": "SmtpUser",               "ParameterValue": secret("SMTP_USER")},
            {"ParameterKey": "SmtpPass",               "ParameterValue": secret("SMTP_PASS")},
            {"ParameterKey": "StorageBucketName",      "ParameterValue": secret("STORAGE_BUCKET_NAME", "jobeasy-bucket-prod")},
            {"ParameterKey": "GoogleClientId",         "ParameterValue": secret("GOOGLE_CLIENT_ID")},
            {"ParameterKey": "FacebookAppId",          "ParameterValue": secret("FACEBOOK_APP_ID")},
            {"ParameterKey": "MercadoPagoAccessToken", "ParameterValue": secret("MP_ACCESS_TOKEN")},
          ]

          with open("/tmp/sam-params.json", "w") as f:
            json.dump(params, f, indent=2)

          # Log sem expor valores sensíveis
          print(f"sam-params.json gerado com {len(params)} parâmetros.")
          db = secret("DB_CONNECTION")
          print(f"DB_CONNECTION length: {len(db)} chars, ends with: ...{db[-30:] if len(db) > 30 else db}")
          PYEOF

      # ── SAM Deploy via subprocess — sem shell, sem interpretação de chars ──
      - name: SAM Deploy
        run: |
          python3 - << 'PYEOF'
          import json, os, subprocess, sys

          with open("/tmp/sam-params.json") as f:
            params = json.load(f)

          # Converte para o formato "Key=Value" que o SAM CLI espera
          overrides = [
            f"ParameterKey={p['ParameterKey']},ParameterValue={p['ParameterValue']}"
            for p in params
          ]

          cmd = [
            "sam", "deploy",
            "--template-file", ".aws-sam/build/template.yaml",
            "--stack-name",    os.environ["STACK_NAME"],
            "--region",        os.environ["AWS_REGION"],
            "--resolve-s3",
            "--capabilities",  "CAPABILITY_IAM", "CAPABILITY_NAMED_IAM",
            "--no-confirm-changeset",
            "--no-fail-on-empty-changeset",
            "--parameter-overrides", *overrides,
          ]

          print(f"Executando sam deploy com {len(overrides)} parâmetros...")
          result = subprocess.run(cmd, check=False)
          sys.exit(result.returncode)
          PYEOF

      - name: Print API URL
        run: |
          aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text
