name: Deploy jobeasy-api (SAM)

on:
  push:
    branches: [ "main" ]
    paths:
      - "src/**"
      - "tests/**"
      - "infra/**"
      - "Jobeasy.sln"
      - "Directory.Build.props"
      - "Dockerfile"
      - ".github/workflows/deploy-jobeasy-api.yml"
  workflow_dispatch:

permissions:
  id-token: write   # necessário para OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: sa-east-1
      STACK_NAME: jobeasy-api
      DB_CONNECTION: ${{ secrets.DB_CONNECTION }}
      MP_ACCESS_TOKEN: ${{ secrets.MP_ACCESS_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore/Build/Test
        run: |
          dotnet restore Jobeasy.sln
          dotnet build Jobeasy.sln -c Release --no-restore
          dotnet test Jobeasy.sln -c Release --no-build

      - name: Setup AWS SAM
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::660573993178:role/GitHubActions-JobeasyApi-Deploy
          aws-region: sa-east-1

      - name: SAM Build
        run: sam build -t infra/sam/template.yaml

      - name: Validate required deploy secrets
        run: |
          if [ -z "${DB_CONNECTION}" ]; then
            echo "ERROR: GitHub secret DB_CONNECTION is empty or not configured." >&2
            exit 1
          fi

          if [ -z "${MP_ACCESS_TOKEN}" ]; then
            echo "ERROR: GitHub secret MP_ACCESS_TOKEN is empty or not configured." >&2
            exit 1
          fi

      - name: SAM Deploy
        run: |
          sam deploy \
            --template-file infra/sam/template.yaml \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --resolve-s3 \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              ParameterKey=DbConnection,ParameterValue="${DB_CONNECTION}" \
              ParameterKey=MercadoPagoAccessToken,ParameterValue="${MP_ACCESS_TOKEN}"
