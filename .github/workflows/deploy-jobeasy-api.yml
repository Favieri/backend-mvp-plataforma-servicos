name: Deploy jobeasy-api (SAM)

on:
  push:
    branches: [ "main" ]
    paths:
      - "src/**"
      - "tests/**"
      - "infra/**"
      - "Jobeasy.sln"
      - "Directory.Build.props"
      - "Makefile"
      - ".github/workflows/deploy-jobeasy-api.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION:  sa-east-1
      STACK_NAME:  jobeasy-api

      # ── Obrigatório ──────────────────────────────────────────────────────────
      DB_CONNECTION: ${{ secrets.DB_CONNECTION || secrets.DATABASE_URL }}

      # ── Com defaults seguros (deploy funciona; substitua pelos valores reais) ─
      JWT_SECRET:           ${{ secrets.JWT_SECRET           || 'jobeasy-jwt-default-CHANGE-IN-PROD' }}
      CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS || 'https://jobeasy.com.br,http://localhost:3000' }}
      APP_BASE_URL:         ${{ secrets.APP_BASE_URL         || 'https://jobeasy.com.br' }}
      EMAIL_FROM:           ${{ secrets.EMAIL_FROM           || 'Jobeasy <naoresponda@jobeasy.com.br>' }}
      STORAGE_BUCKET_NAME:  ${{ secrets.STORAGE_BUCKET_NAME  || 'jobeasy-storage-prod' }}

      # ── Opcionais (vazio = feature desabilitada) ─────────────────────────────
      SMTP_HOST:       ${{ secrets.SMTP_HOST       || '' }}
      SMTP_PORT:       ${{ secrets.SMTP_PORT       || '587' }}
      SMTP_USER:       ${{ secrets.SMTP_USER       || '' }}
      SMTP_PASS:       ${{ secrets.SMTP_PASS       || '' }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID || '' }}
      FACEBOOK_APP_ID:  ${{ secrets.FACEBOOK_APP_ID  || '' }}
      MP_ACCESS_TOKEN:  ${{ secrets.MP_ACCESS_TOKEN  || secrets.MERCADOPAGO_ACCESS_TOKEN || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Validate required secrets
        run: |
          MISSING=()
          [ -z "${DB_CONNECTION}" ] && MISSING+=("DB_CONNECTION (ou DATABASE_URL)")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "ERROR: os seguintes secrets são obrigatórios e não foram configurados:" >&2
            for s in "${MISSING[@]}"; do echo "  - $s" >&2; done
            echo "" >&2
            echo "Configure em: GitHub → Settings → Secrets and variables → Actions" >&2
            exit 1
          fi
          # Avisos informativos (não bloqueiam)
          [ "${JWT_SECRET}" = "jobeasy-jwt-default-CHANGE-IN-PROD" ] \
            && echo "WARN: JWT_SECRET usando valor default — configure o secret JWT_SECRET para produção" >&2 || true
          [ -z "${SMTP_HOST}" ] \
            && echo "INFO: SMTP_HOST não configurado — emails desabilitados" >&2 || true
          echo "OK — prosseguindo com deploy."

      - name: Restore / Build / Test
        run: |
          dotnet restore Jobeasy.sln
          dotnet build Jobeasy.sln -c Release --no-restore
          dotnet test Jobeasy.sln -c Release --no-build

      - name: Setup AWS SAM
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::660573993178:role/GitHubActions-JobeasyApi-Deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate SAM template and Makefile
        run: |
          test -f Makefile               || (echo "ERROR: Makefile não encontrado na raiz" >&2; exit 1)
          test -f infra/sam/template.yaml || (echo "ERROR: infra/sam/template.yaml não encontrado" >&2; exit 1)
          sam validate -t infra/sam/template.yaml --lint

      - name: SAM Build
        run: sam build -t infra/sam/template.yaml

      - name: Validate SAM build artifacts
        run: |
          echo "=== Conteúdo da função buildada ==="
          ls -la .aws-sam/build/JobeasyApiFunction/
          test -f .aws-sam/build/JobeasyApiFunction/Api.dll \
            || (echo "ERRO: Api.dll ausente no artefato" >&2; exit 1)
          test -f .aws-sam/build/JobeasyApiFunction/Api.deps.json \
            || (echo "ERRO: Api.deps.json ausente no artefato" >&2; exit 1)
          test -f .aws-sam/build/JobeasyApiFunction/Api.runtimeconfig.json \
            || (echo "ERRO: Api.runtimeconfig.json ausente no artefato" >&2; exit 1)
          test ! -f .aws-sam/build/JobeasyApiFunction/Api \
            || (echo "ERRO: binário nativo presente — remova UseAppHost" >&2; exit 1)
          echo "Artefatos OK."

      - name: Gerar arquivo de parâmetros SAM
        run: |
          # Usa arquivo JSON para evitar que caracteres especiais (;  &  |  @)
          # nos valores dos secrets sejam interpretados pelo shell.
          python3 -c "
          import json, os
          params = [
            {'ParameterKey': 'DbConnection',           'ParameterValue': os.environ['DB_CONNECTION']},
            {'ParameterKey': 'JwtSecret',              'ParameterValue': os.environ['JWT_SECRET']},
            {'ParameterKey': 'CorsAllowedOrigins',     'ParameterValue': os.environ['CORS_ALLOWED_ORIGINS']},
            {'ParameterKey': 'AppBaseUrl',             'ParameterValue': os.environ['APP_BASE_URL']},
            {'ParameterKey': 'EmailFrom',              'ParameterValue': os.environ['EMAIL_FROM']},
            {'ParameterKey': 'SmtpHost',               'ParameterValue': os.environ['SMTP_HOST']},
            {'ParameterKey': 'SmtpPort',               'ParameterValue': os.environ['SMTP_PORT']},
            {'ParameterKey': 'SmtpUser',               'ParameterValue': os.environ['SMTP_USER']},
            {'ParameterKey': 'SmtpPass',               'ParameterValue': os.environ['SMTP_PASS']},
            {'ParameterKey': 'StorageBucketName',      'ParameterValue': os.environ['STORAGE_BUCKET_NAME']},
            {'ParameterKey': 'GoogleClientId',         'ParameterValue': os.environ['GOOGLE_CLIENT_ID']},
            {'ParameterKey': 'FacebookAppId',          'ParameterValue': os.environ['FACEBOOK_APP_ID']},
            {'ParameterKey': 'MercadoPagoAccessToken', 'ParameterValue': os.environ['MP_ACCESS_TOKEN']},
          ]
          with open('/tmp/sam-params.json', 'w') as f:
            json.dump(params, f)
          print(f'Arquivo gerado com {len(params)} parâmetros.')
          "

      - name: SAM Deploy
        run: |
          # IMPORTANTE: todos os parâmetros são sempre passados explicitamente.
          # Parâmetros não passados ficam congelados no valor do deploy anterior (comportamento CloudFormation).
          # Por isso NÃO usar lógica condicional aqui — passar sempre, mesmo que vazio.
          sam deploy \
            --template-file .aws-sam/build/template.yaml \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --resolve-s3 \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides file:///tmp/sam-params.json

      - name: Print deployed API URL
        run: |
          aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text
