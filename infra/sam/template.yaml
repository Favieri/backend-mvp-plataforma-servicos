AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Jobeasy API (.NET 8 Minimal API + Lambda HTTP API v2)

Globals:
  Function:
    Runtime: dotnet8
    Timeout: 30
    MemorySize: 512
    Environment:
      Variables:
        ASPNETCORE_ENVIRONMENT: Production
        DB_CONNECTION:          !Ref DbConnection
        DB_TIMEOUT_SECONDS:     !Ref DbTimeoutSeconds
        JWT_SECRET:             !Ref JwtSecret
        CORS_ALLOWED_ORIGINS:   !Ref CorsAllowedOrigins
        APP_BASE_URL:           !Ref AppBaseUrl
        EMAIL_FROM:             !Ref EmailFrom
        SMTP_HOST:              !Ref SmtpHost
        SMTP_PORT:              !Ref SmtpPort
        SMTP_USER:              !Ref SmtpUser
        SMTP_PASS:              !Ref SmtpPass
        STORAGE_BUCKET_NAME:    !Ref StorageBucketName
        GOOGLE_CLIENT_ID:       !Ref GoogleClientId
        FACEBOOK_APP_ID:        !Ref FacebookAppId

Parameters:
  # ── Banco (obrigatório) ─────────────────────────────────────────────────────
  DbConnection:
    Type: String
    NoEcho: true
    Description: "String de conexão PostgreSQL"
  DbTimeoutSeconds:
    Type: String
    Default: '15'

  # ── Autenticação ────────────────────────────────────────────────────────────
  JwtSecret:
    Type: String
    NoEcho: true
    Default: 'jobeasy-jwt-default-CHANGE-IN-PROD'
    Description: "Secret HMAC-SHA256 para assinar JWTs — configurar JWT_SECRET no GitHub Secrets"

  # ── CORS ────────────────────────────────────────────────────────────────────
  CorsAllowedOrigins:
    Type: String
    Default: 'https://jobeasy.com.br,http://localhost:3000'
    Description: "Origens CORS permitidas (vírgula-separadas ou *)"

  # ── App ─────────────────────────────────────────────────────────────────────
  AppBaseUrl:
    Type: String
    Default: 'https://jobeasy.com.br'
    Description: "URL base do frontend (usada em links de email)"

  # ── Email ───────────────────────────────────────────────────────────────────
  EmailFrom:
    Type: String
    Default: 'Jobeasy <naoresponda@jobeasy.com.br>'
    Description: "Remetente padrão de emails transacionais"
  SmtpHost:
    Type: String
    Default: ''
    Description: "Host SMTP (vazio = emails desabilitados)"
  SmtpPort:
    Type: String
    Default: '587'
  SmtpUser:
    Type: String
    Default: ''
    NoEcho: true
  SmtpPass:
    Type: String
    Default: ''
    NoEcho: true

  # ── Storage S3 ──────────────────────────────────────────────────────────────
  StorageBucketName:
    Type: String
    Default: 'jobeasy-storage-prod'
    Description: "Nome do bucket S3 para avatars e anexos"

  # ── Social Auth ─────────────────────────────────────────────────────────────
  GoogleClientId:
    Type: String
    Default: ''
    Description: "Google OAuth Client ID (vazio = login Google desabilitado)"
  FacebookAppId:
    Type: String
    Default: ''
    Description: "Facebook App ID (vazio = login Facebook desabilitado)"

  # ── Mercado Pago ────────────────────────────────────────────────────────────
  MercadoPagoAccessToken:
    Type: String
    NoEcho: true
    Default: ''
    Description: "Access Token da conta da plataforma (vazio = pagamentos desabilitados)"
  MpAppId:
    Type: String
    Default: ''
    Description: "Application ID numérico da aplicação MP (Client ID para OAuth)"
  MpClientSecret:
    Type: String
    NoEcho: true
    Default: ''
    Description: "Client Secret da aplicação MP (trocado pelo access token do profissional)"
  MpRedirectUri:
    Type: String
    Default: ''
    Description: "URI de callback OAuth registrada no painel MP (ex: https://<api-gw>/payments/mp/callback)"
  MpFrontendBaseUrl:
    Type: String
    Default: 'https://jobeasy.com.br'
    Description: "URL base do frontend para redirecionamento pós-OAuth"

Resources:
  JobeasyHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: '$default'

  JobeasyApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../
      Handler: Api
      Environment:
        Variables:
          # Mercado Pago fora de Globals pois usa chave com __ (seção aninhada ASP.NET)
          MERCADOPAGO__ACCESSTOKEN:    !Ref MercadoPagoAccessToken
          MERCADOPAGO__APPID:          !Ref MpAppId
          MERCADOPAGO__CLIENTSECRET:   !Ref MpClientSecret
          MERCADOPAGO__REDIRECTURI:    !Ref MpRedirectUri
          MERCADOPAGO__FRONTENDBASEURL: !Ref MpFrontendBaseUrl
      Events:
        ProxyEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref JobeasyHttpApi
            Path: /{proxy+}
            Method: ANY
      Policies:
        - AWSLambdaBasicExecutionRole
        - S3CrudPolicy:
            BucketName: !Ref StorageBucketName
    Metadata:
      BuildMethod: makefile

Outputs:
  ApiUrl:
    Description: HTTP API endpoint URL
    Value: !Sub 'https://${JobeasyHttpApi}.execute-api.${AWS::Region}.amazonaws.com'
  StorageBucketNameOutput:
    Description: Bucket S3 de storage
    Value: !Ref StorageBucketName
