name: Deploy jobeasy-api (SAM)

on:
  push:
    branches: [ "main" ]
    paths:
      - "src/**"
      - "tests/**"
      - "infra/**"
      - "Jobeasy.sln"
      - "Directory.Build.props"
      - "Makefile"
      - ".github/workflows/deploy-jobeasy-api.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: sa-east-1
      STACK_NAME: jobeasy-api
      DB_CONNECTION: ${{ secrets.DB_CONNECTION || secrets.DATABASE_URL }}

      # ── Com defaults — deploy funciona sem o secret; substituir depois ────────
      JWT_SECRET:           ${{ secrets.JWT_SECRET           || 'jobeasy-jwt-default-CHANGE-IN-PROD' }}
      STORAGE_BUCKET_NAME:  ${{ secrets.STORAGE_BUCKET_NAME  || 'jobeasy-storage-prod' }}
      MP_ACCESS_TOKEN:      ${{ secrets.MP_ACCESS_TOKEN || secrets.MERCADOPAGO_ACCESS_TOKEN || '' }}
      GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID     || '' }}
      FACEBOOK_APP_ID:      ${{ secrets.FACEBOOK_APP_ID      || '' }}
      CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS || '*' }}
      SMTP_HOST:            ${{ secrets.SMTP_HOST            || '' }}
      SMTP_USER:            ${{ secrets.SMTP_USER            || '' }}
      SMTP_PASS:            ${{ secrets.SMTP_PASS            || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Validate required secrets
        run: |
          MISSING=()
          [ -z "${DB_CONNECTION}" ] && MISSING+=("DB_CONNECTION (ou DATABASE_URL)")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "ERROR: os seguintes secrets são obrigatórios e não foram configurados:" >&2
            for s in "${MISSING[@]}"; do echo "  - $s" >&2; done
            echo "" >&2
            echo "Configure em: GitHub repo → Settings → Secrets and variables → Actions → New repository secret" >&2
            exit 1
          fi
          # Avisos para secrets opcionais ausentes (não bloqueiam)
          [ -z "${{ secrets.JWT_SECRET }}" ]          && echo "WARN: JWT_SECRET não configurado — usando valor default (inseguro para produção)" >&2 || true
          [ -z "${{ secrets.STORAGE_BUCKET_NAME }}" ] && echo "WARN: STORAGE_BUCKET_NAME não configurado — usando 'jobeasy-storage-prod'" >&2 || true
          echo "Validação concluída."

      - name: Restore / Build / Test
        run: |
          dotnet restore Jobeasy.sln
          dotnet build Jobeasy.sln -c Release --no-restore
          dotnet test Jobeasy.sln -c Release --no-build

      - name: Setup AWS SAM
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::660573993178:role/GitHubActions-JobeasyApi-Deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate SAM template and Makefile
        run: |
          test -f Makefile              || (echo "ERROR: Makefile não encontrado na raiz" >&2; exit 1)
          test -f infra/sam/template.yaml || (echo "ERROR: infra/sam/template.yaml não encontrado" >&2; exit 1)
          sam validate -t infra/sam/template.yaml --lint

      - name: SAM Build
        run: sam build -t infra/sam/template.yaml

      - name: Validate SAM build artifacts
        run: |
          echo "=== Conteúdo da função buildada ==="
          ls -la .aws-sam/build/JobeasyApiFunction/
          echo ""
          test -f .aws-sam/build/JobeasyApiFunction/Api.dll \
            || (echo "ERRO: Api.dll ausente no artefato" >&2; exit 1)
          test -f .aws-sam/build/JobeasyApiFunction/Api.deps.json \
            || (echo "ERRO: Api.deps.json ausente no artefato" >&2; exit 1)
          test -f .aws-sam/build/JobeasyApiFunction/Api.runtimeconfig.json \
            || (echo "ERRO: Api.runtimeconfig.json ausente no artefato" >&2; exit 1)
          test ! -f .aws-sam/build/JobeasyApiFunction/Api \
            || (echo "ERRO: binário nativo 'Api' presente — remova UseAppHost" >&2; exit 1)
          echo "Artefatos OK."

      - name: SAM Deploy
        run: |
          PARAM_OVERRIDES=(
            "ParameterKey=DbConnection,ParameterValue=${DB_CONNECTION}"
            "ParameterKey=JwtSecret,ParameterValue=${JWT_SECRET}"
          )

          [ -n "${STORAGE_BUCKET_NAME}" ]  && PARAM_OVERRIDES+=("ParameterKey=StorageBucketName,ParameterValue=${STORAGE_BUCKET_NAME}")
          [ -n "${MP_ACCESS_TOKEN}" ]      && PARAM_OVERRIDES+=("ParameterKey=MercadoPagoAccessToken,ParameterValue=${MP_ACCESS_TOKEN}")
          [ -n "${GOOGLE_CLIENT_ID}" ]     && PARAM_OVERRIDES+=("ParameterKey=GoogleClientId,ParameterValue=${GOOGLE_CLIENT_ID}")
          [ -n "${FACEBOOK_APP_ID}" ]      && PARAM_OVERRIDES+=("ParameterKey=FacebookAppId,ParameterValue=${FACEBOOK_APP_ID}")
          [ -n "${CORS_ALLOWED_ORIGINS}" ] && PARAM_OVERRIDES+=("ParameterKey=CorsAllowedOrigins,ParameterValue=${CORS_ALLOWED_ORIGINS}")
          [ -n "${SMTP_HOST}" ]            && PARAM_OVERRIDES+=("ParameterKey=SmtpHost,ParameterValue=${SMTP_HOST}")
          [ -n "${SMTP_USER}" ]            && PARAM_OVERRIDES+=("ParameterKey=SmtpUser,ParameterValue=${SMTP_USER}")
          [ -n "${SMTP_PASS}" ]            && PARAM_OVERRIDES+=("ParameterKey=SmtpPass,ParameterValue=${SMTP_PASS}")

          echo "Parâmetros a passar ao CloudFormation: ${#PARAM_OVERRIDES[@]}"

          sam deploy \
            --template-file .aws-sam/build/template.yaml \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --resolve-s3 \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides "${PARAM_OVERRIDES[@]}"

      - name: Print API URL
        run: |
          aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text
